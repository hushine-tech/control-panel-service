dependencies:
  account_service_grpc: "127.0.0.1:50051"
  order_service_grpc: "127.0.0.1:50051"
  legacy_strategy_service_grpc: "127.0.0.1:50053"

# Platform-wide caps. Effective per-user limits combine plan and platform
# according to applyPlatformCap (plan/resolver.go):
#   *  -1  → unlimited on this side
#   *   0  → hard cap of 0 (forbidden); takes precedence
#   *  >0  → the smaller of the two non-unlimited sides; if the other
#           side is unlimited, this side wins
# Don't leave these as 0 unless you really mean "deny all"; use -1 for
# "no platform cap".
runtime_platform:
  max_total_hosted_runtimes: 50
  max_total_self_hosted_runtimes: 100
  default_plan_code: "pro"
  heartbeat_grace_seconds: 30
  death_grace_seconds: 300
  caller_token_ttl_seconds: 60

runtime_plans:
  # Plan limits use the same convention as runtime_platform above:
  #   0  → forbidden (hard cap of 0)
  #  -1  → unlimited
  #  >0  → real cap
  free:
    max_hosted_runtimes: 1
    max_self_hosted_runtimes: 0   # forbidden for free plan
    max_routing_enabled_runtimes: 1
    max_concurrent_sessions_total: 2
    max_concurrent_sessions_per_runtime: 2
    allowed_resource_profiles: ["small"]
    allow_self_hosted_runtime: false
    allow_ide_debug: false
  developer:
    max_hosted_runtimes: 2
    max_self_hosted_runtimes: 2
    max_routing_enabled_runtimes: 3
    max_concurrent_sessions_total: 5
    max_concurrent_sessions_per_runtime: 3
    allowed_resource_profiles: ["small", "medium"]
    allow_self_hosted_runtime: true
    allow_ide_debug: false
  pro:
    max_hosted_runtimes: 5
    max_self_hosted_runtimes: 10
    max_routing_enabled_runtimes: 10
    max_concurrent_sessions_total: 20
    max_concurrent_sessions_per_runtime: 5
    allowed_resource_profiles: ["small", "medium", "large"]
    allow_self_hosted_runtime: true
    allow_ide_debug: true

# Phase D1 section 5 — hosted runtime provisioning.
#   backend: ""/"noop" → NoOpProvisioner (EnsureHostedRuntime fails closed)
#           "docker"   → DockerProvisioner (real `docker run`)
provisioning:
  backend: "docker"
  image: "hushine/strategy-runtime:executor-dev"
  advertise_host: "127.0.0.1"
  port_range_base: 50100
  port_range_size: 200
  registration_timeout_seconds: 30
  profiles:
    small:
      nano_cpus: "0.5"
      memory_mb: 512
      pids_limit: 256
    medium:
      nano_cpus: "1.0"
      memory_mb: 1024
      pids_limit: 512
    large:
      nano_cpus: "2.0"
      memory_mb: 2048
      pids_limit: 1024
  # DockerProvisioner-specific settings. Ignored when backend != "docker".
  docker:
    # "host" = container shares host network (simplest single-host dev).
    #          The runtime listens on the platform-allocated host port.
    #          quant-handler dials advertise_host:allocated_port directly.
    # "bridge" / custom = container gets its own network namespace; the
    #          provisioner adds -p HOST:CONTAINER to map the allocated
    #          host port to the in-container 50053. Operator must set
    #          runtime_env addresses to be reachable from inside the
    #          container (host.docker.internal or service names).
    network_mode: "bridge"
    # What the runtime container should dial for self-registration. NOT
    # the same as server.grpc_addr (that is the BIND address, e.g.
    # ":50054"). Default for host networking is "127.0.0.1:<bind_port>".
    # Bridge / custom networks REQUIRE explicit value:
    # "host.docker.internal:50054" or routable LAN/service address.
    control_panel_dial_addr: "host.docker.internal:50054"
    label_prefix: "hushine.runtime"
    runtime_user_grpc_port: 50053
    runtime_env:
      CORE_SERVICE_GRPC_ADDR: "127.0.0.1:50051"
      ACCOUNT_SERVICE_GRPC_ADDR: "127.0.0.1:50051"
      ORDER_SERVICE_GRPC_ADDR: "127.0.0.1:50051"
      KAFKA_BROKERS: "127.0.0.1:19092"
      DATABASE_HOST: "127.0.0.1"
      DATABASE_PORT: "5432"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "postgres"

notification:
  enabled: true
  kafka:
    brokers: ["192.168.88.10:19092"]
    topic: "notification.events"
    client_id: "control-panel-service"

log:
  output_dir: "./logs"
  local_file:
    enabled: true
  kafka:
    enabled: true
    brokers: ["192.168.88.10:19092"]
    topic: "app-logs"
    topic_prefix: "app-logs"
  tracing:
    enabled: true
    endpoint: "http://192.168.88.10:4318"
    service_name: "control-panel-service"
